# Fly.io deployment for My Precious portfolio tracker.
# Free tier (Hobby plan) gives you 3GB volumes and a small always-on machine,
# which works well for a personal tracker. Run `fly launch --no-deploy` once
# to claim the app name, then `fly volumes create data --size 1`, set secrets,
# and `fly deploy`.

app = "my-precious"
primary_region = "iad"  # change to a region closer to you

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8080"
  PORTFOLIO_DB = "/data/portfolio.db"
  FORCE_HTTPS = "true"

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.healthz]
      grace_period = "10s"
      interval = "30s"
      method = "GET"
      path = "/healthz"
      timeout = "5s"

[processes]
  app = "gunicorn app:app --bind 0.0.0.0:8080 --workers 2 --threads 4 --timeout 60"
